<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Oxanium',sans-serif;
  background:url('https://i.ibb.co/7x4vqZqd/image.jpg') no-repeat center center/cover;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.glass-box{
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px);
  width:100%;
  max-width:650px;
  padding:50px 40px;
  border-radius:25px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.18);
  display:flex;
  flex-direction:column;
  align-items:center;
}

.logo-img{
  width:180px;
  height:180px;
  border-radius:50%;
  border:4px solid #ffdb4d;
  box-shadow:0 0 20px #ffdb4d;
  object-fit:cover;
  margin-bottom:20px;
}

.title{
  font-size:48px;
  font-weight:700;
  color:#ffdb4d;
  text-shadow:0 0 15px #ffdb4d;
  margin-bottom:10px;
}

.sub-title{
  font-size:24px;
  color:#ffe26f;
  margin-bottom:25px;
}

.join-btn{
  width:100%;
  padding:20px;
  background:linear-gradient(90deg,#0088cc,#00a8ff);
  color:#fff;
  text-decoration:none;
  border-radius:14px;
  font-size:24px;
  font-weight:700;
  box-shadow:0 0 15px #00a8ff;
  margin-bottom:20px;
  animation:pulse 1.7s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(0.96);}
  100%{transform:scale(1);}
}

.highlight{
  color:#ffdb4d;
  border:1px solid #ffdb4d;
  padding:10px 18px;
  border-radius:8px;
  font-size:18px;
  margin:15px 0;
}

p{
  color:#fff;
  font-size:20px;
  margin:6px 0;
}

footer{
  color:#ccc;
  font-size:14px;
  margin-top:15px;
}

.ad-box{
  margin-top:20px;
  background:linear-gradient(135deg,#4f46e5,#9333ea,#ec4899);
  padding:10px 16px;
  font-size:14px;
  color:#fff;
  border-radius:10px;
  display:inline-block;
  animation:glow 2s infinite alternate;
}

.ad-box a{
  color:#6cb6ff;
  text-decoration:none;
  font-weight:700;
}

@keyframes glow{
  from{box-shadow:0 0 8px #9333ea;}
  to{box-shadow:0 0 14px #ec4899;}
}

/* Tablet */
@media(max-width:768px){

  .glass-box{
    padding:35px 25px;
  }

  .logo-img{
    width:140px;
    height:140px;
  }

  .title{
    font-size:36px;
  }

  .sub-title{
    font-size:18px;
  }

  .join-btn{
    font-size:20px;
    padding:16px;
  }

  p{
    font-size:16px;
  }
}

/* Mobile */
@media(max-width:480px){

  body{
    padding:12px;
  }

  .glass-box{
    padding:25px 18px;
    border-radius:18px;
  }

  .logo-img{
    width:110px;
    height:110px;
  }

  .title{
    font-size:28px;
  }

  .sub-title{
    font-size:15px;
  }

  .join-btn{
    font-size:17px;
    padding:14px;
  }

  .highlight{
    font-size:13px;
  }

  p{
    font-size:14px;
  }

  footer{
    font-size:11px;
  }

  .ad-box{
    font-size:12px;
    padding:8px 12px;
  }
}
</style>

</head>
